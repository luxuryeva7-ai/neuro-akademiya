<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
  <title>Нейро Академия</title>
  <link rel="preconnect" href="https://fonts.bunny.net">
  <link href="https://fonts.bunny.net/css?family=orbitron:400,700,800,900|space-grotesk:400,500,600,700,800&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      background:#020818;
      font-family:'Space Grotesk',sans-serif;
      overflow-x:hidden;
      padding-top:var(--tg-safe-area-inset-top,0px);
      color:#e2e8f0;
    }
    button{font-family:'Space Grotesk',sans-serif;-webkit-tap-highlight-color:transparent;cursor:pointer;border:none;outline:none}
    input{font-family:'Space Grotesk',sans-serif}
    ::-webkit-scrollbar{width:0}
    #root{min-height:100vh;padding-bottom:max(var(--tg-safe-area-inset-bottom,0px),20px)}
    @keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    @keyframes slideDown{from{opacity:0;transform:translateY(-20px) translateX(-50%)}to{opacity:1;transform:translateY(0) translateX(-50%)}}
    @keyframes rocketFloat{0%,100%{transform:translateY(0) rotate(-1.5deg)}50%{transform:translateY(-14px) rotate(1.5deg)}}
    @keyframes pop{0%{transform:scale(.7);opacity:0}60%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
    @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
    @keyframes cardIn{from{opacity:0;transform:scale(.88) translateY(18px)}to{opacity:1;transform:scale(1) translateY(0)}}
    @keyframes twinkle{0%,100%{opacity:.1;transform:scale(1)}50%{opacity:.9;transform:scale(1.6)}}
    @keyframes borderPulse{0%,100%{border-color:rgba(0,217,126,.2)}50%{border-color:rgba(0,217,126,.6)}}
    @keyframes nebulaGlow{0%,100%{opacity:0.5}50%{opacity:1}}
    @keyframes sp{to{transform:rotate(360deg)}}
    @keyframes glowPulse{0%,100%{box-shadow:0 0 20px rgba(0,217,126,0.3)}50%{box-shadow:0 0 40px rgba(0,217,126,0.7)}}
    @keyframes orbitronGlow{0%,100%{text-shadow:0 0 10px rgba(0,217,126,0.5)}50%{text-shadow:0 0 30px rgba(0,217,126,1),0 0 60px rgba(0,217,126,0.5)}}
  </style>
</head>
<body>
<div id="loading" style="position:fixed;inset:0;background:#020818;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999">
  <div style="width:56px;height:56px;border:3px solid #0a1628;border-top:3px solid #00d97e;border-radius:50%;animation:sp 1s linear infinite"></div>
  <div style="color:#00d97e;margin-top:16px;font-size:11px;letter-spacing:3px;font-family:'Orbitron',sans-serif;font-weight:700">НЕЙРО АКАДЕМИЯ</div>
</div>
<div id="root"></div>
<script>// WebView
(function () {
  var eventHandlers = {};

  var locationHash = '';
  try {
    locationHash = location.hash.toString();
  } catch (e) {}

  var initParams = urlParseHashParams(locationHash);
  var storedParams = sessionStorageGet('initParams');
  if (storedParams) {
    for (var key in storedParams) {
      if (typeof initParams[key] === 'undefined') {
        initParams[key] = storedParams[key];
      }
    }
  }
  sessionStorageSet('initParams', initParams);

  var isIframe = false, iFrameStyle;
  try {
    isIframe = (window.parent != null && window != window.parent);
    if (isIframe) {
      window.addEventListener('message', function (event) {
        if (event.source !== window.parent) return;
        try {
          var dataParsed = JSON.parse(event.data);
        } catch (e) {
          return;
        }
        if (!dataParsed || !dataParsed.eventType) {
          return;
        }
        if (dataParsed.eventType == 'set_custom_style') {
          if (event.origin === 'https://web.telegram.org') {
            iFrameStyle.innerHTML = dataParsed.eventData;
          }
        } else if (dataParsed.eventType == 'reload_iframe') {
          try {
            window.parent.postMessage(JSON.stringify({eventType: 'iframe_will_reload'}), '*');
          } catch (e) {}
          location.reload();
        } else {
          receiveEvent(dataParsed.eventType, dataParsed.eventData);
        }
      });
      iFrameStyle = document.createElement('style');
      document.head.appendChild(iFrameStyle);
      try {
        window.parent.postMessage(JSON.stringify({eventType: 'iframe_ready', eventData: {reload_supported: true}}), '*');
      } catch (e) {}
    }
  } catch (e) {}

  function urlSafeDecode(urlencoded) {
    try {
      urlencoded = urlencoded.replace(/\+/g, '%20');
      return decodeURIComponent(urlencoded);
    } catch (e) {
      return urlencoded;
    }
  }

  function urlParseHashParams(locationHash) {
    locationHash = locationHash.replace(/^#/, '');
    var params = {};
    if (!locationHash.length) {
      return params;
    }
    if (locationHash.indexOf('=') < 0 && locationHash.indexOf('?') < 0) {
      params._path = urlSafeDecode(locationHash);
      return params;
    }
    var qIndex = locationHash.indexOf('?');
    if (qIndex >= 0) {
      var pathParam = locationHash.substr(0, qIndex);
      params._path = urlSafeDecode(pathParam);
      locationHash = locationHash.substr(qIndex + 1);
    }
    var query_params = urlParseQueryString(locationHash);
    for (var k in query_params) {
      params[k] = query_params[k];
    }
    return params;
  }

  function urlParseQueryString(queryString) {
    var params = {};
    if (!queryString.length) {
      return params;
    }
    var queryStringParams = queryString.split('&');
    var i, param, paramName, paramValue;
    for (i = 0; i < queryStringParams.length; i++) {
      param = queryStringParams[i].split('=');
      paramName = urlSafeDecode(param[0]);
      paramValue = param[1] == null ? null : urlSafeDecode(param[1]);
      params[paramName] = paramValue;
    }
    return params;
  }

  // Telegram apps will implement this logic to add service params (e.g. tgShareScoreUrl) to game URL
  function urlAppendHashParams(url, addHash) {
    // url looks like 'https://game.com/path?query=1#hash'
    // addHash looks like 'tgShareScoreUrl=' + encodeURIComponent('tgb://share_game_score?hash=very_long_hash123')

    var ind = url.indexOf('#');
    if (ind < 0) {
      // https://game.com/path -> https://game.com/path#tgShareScoreUrl=etc
      return url + '#' + addHash;
    }
    var curHash = url.substr(ind + 1);
    if (curHash.indexOf('=') >= 0 || curHash.indexOf('?') >= 0) {
      // https://game.com/#hash=1 -> https://game.com/#hash=1&tgShareScoreUrl=etc
      // https://game.com/#path?query -> https://game.com/#path?query&tgShareScoreUrl=etc
      return url + '&' + addHash;
    }
    // https://game.com/#hash -> https://game.com/#hash?tgShareScoreUrl=etc
    if (curHash.length > 0) {
      return url + '?' + addHash;
    }
    // https://game.com/# -> https://game.com/#tgShareScoreUrl=etc
    return url + addHash;
  }

  function postEvent(eventType, callback, eventData) {
    if (!callback) {
      callback = function () {};
    }
    if (eventData === undefined) {
      eventData = '';
    }
    console.log('[Telegram.WebView] > postEvent', eventType, eventData);

    if (window.TelegramWebviewProxy !== undefined) {
      TelegramWebviewProxy.postEvent(eventType, JSON.stringify(eventData));
      callback();
    }
    else if (window.external && 'notify' in window.external) {
      window.external.notify(JSON.stringify({eventType: eventType, eventData: eventData}));
      callback();
    }
    else if (isIframe) {
      try {
        var trustedTarget = 'https://web.telegram.org';
        // For now we don't restrict target, for testing purposes
        trustedTarget = '*';
        window.parent.postMessage(JSON.stringify({eventType: eventType, eventData: eventData}), trustedTarget);
        callback();
      } catch (e) {
        callback(e);
      }
    }
    else {
      callback({notAvailable: true});
    }
  };

  function receiveEvent(eventType, eventData) {
    console.log('[Telegram.WebView] < receiveEvent', eventType, eventData);
    callEventCallbacks(eventType, function(callback) {
      callback(eventType, eventData);
    });
  }

  function callEventCallbacks(eventType, func) {
    var curEventHandlers = eventHandlers[eventType];
    if (curEventHandlers === undefined ||
        !curEventHandlers.length) {
      return;
    }
    for (var i = 0; i < curEventHandlers.length; i++) {
      try {
        func(curEventHandlers[i]);
      } catch (e) {}
    }
  }

  function onEvent(eventType, callback) {
    if (eventHandlers[eventType] === undefined) {
      eventHandlers[eventType] = [];
    }
    var index = eventHandlers[eventType].indexOf(callback);
    if (index === -1) {
      eventHandlers[eventType].push(callback);
    }
  };

  function offEvent(eventType, callback) {
    if (eventHandlers[eventType] === undefined) {
      return;
    }
    var index = eventHandlers[eventType].indexOf(callback);
    if (index === -1) {
      return;
    }
    eventHandlers[eventType].splice(index, 1);
  };

  function openProtoUrl(url) {
    if (!url.match(/^(web\+)?tgb?:\/\/./)) {
      return false;
    }
    var useIframe = navigator.userAgent.match(/iOS|iPhone OS|iPhone|iPod|iPad/i) ? true : false;
    if (useIframe) {
      var iframeContEl = document.getElementById('tgme_frame_cont') || document.body;
      var iframeEl = document.createElement('iframe');
      iframeContEl.appendChild(iframeEl);
      var pageHidden = false;
      var enableHidden = function () {
        pageHidden = true;
      };
      window.addEventListener('pagehide', enableHidden, false);
      window.addEventListener('blur', enableHidden, false);
      if (iframeEl !== null) {
        iframeEl.src = url;
      }
      setTimeout(function() {
        if (!pageHidden) {
          window.location = url;
        }
        window.removeEventListener('pagehide', enableHidden, false);
        window.removeEventListener('blur', enableHidden, false);
      }, 2000);
    }
    else {
      window.location = url;
    }
    return true;
  }

  function sessionStorageSet(key, value) {
    try {
      window.sessionStorage.setItem('__telegram__' + key, JSON.stringify(value));
      return true;
    } catch(e) {}
    return false;
  }
  function sessionStorageGet(key) {
    try {
      return JSON.parse(window.sessionStorage.getItem('__telegram__' + key));
    } catch(e) {}
    return null;
  }

  if (!window.Telegram) {
    window.Telegram = {};
  }
  window.Telegram.WebView = {
    initParams: initParams,
    isIframe: isIframe,
    onEvent: onEvent,
    offEvent: offEvent,
    postEvent: postEvent,
    receiveEvent: receiveEvent,
    callEventCallbacks: callEventCallbacks
  };

  window.Telegram.Utils = {
    urlSafeDecode: urlSafeDecode,
    urlParseQueryString: urlParseQueryString,
    urlParseHashParams: urlParseHashParams,
    urlAppendHashParams: urlAppendHashParams,
    sessionStorageSet: sessionStorageSet,
    sessionStorageGet: sessionStorageGet
  };

  // For Windows Phone app
  window.TelegramGameProxy_receiveEvent = receiveEvent;

  // App backward compatibility
  window.TelegramGameProxy = {
    receiveEvent: receiveEvent
  };
})();

// WebApp
(function () {
  var Utils = window.Telegram.Utils;
  var WebView = window.Telegram.WebView;
  var initParams = WebView.initParams;
  var isIframe = WebView.isIframe;

  var WebApp = {};
  var webAppInitData = '', webAppInitDataUnsafe = {};
  var themeParams = {}, colorScheme = 'light';
  var webAppVersion = '6.0';
  var webAppPlatform = 'unknown';
  var webAppIsActive = true;
  var webAppIsFullscreen = false;
  var webAppIsOrientationLocked = false;
  var webAppBackgroundColor = 'bg_color';
  var webAppHeaderColorKey = 'bg_color';
  var webAppHeaderColor = null;

  if (initParams.tgWebAppData && initParams.tgWebAppData.length) {
    webAppInitData = initParams.tgWebAppData;
    webAppInitDataUnsafe = Utils.urlParseQueryString(webAppInitData);
    for (var key in webAppInitDataUnsafe) {
      var val = webAppInitDataUnsafe[key];
      try {
        if (val.substr(0, 1) == '{' && val.substr(-1) == '}' ||
            val.substr(0, 1) == '[' && val.substr(-1) == ']') {
          webAppInitDataUnsafe[key] = JSON.parse(val);
        }
      } catch (e) {}
    }
  }
  var stored_theme_params = Utils.sessionStorageGet('themeParams');
  if (initParams.tgWebAppThemeParams && initParams.tgWebAppThemeParams.length) {
    var themeParamsRaw = initParams.tgWebAppThemeParams;
    try {
      var theme_params = JSON.parse(themeParamsRaw);
      if (theme_params) {
        setThemeParams(theme_params);
      }
    } catch (e) {}
  }
  if (stored_theme_params) {
    setThemeParams(stored_theme_params);
  }
  var stored_def_colors = Utils.sessionStorageGet('defaultColors');
  if (initParams.tgWebAppDefaultColors && initParams.tgWebAppDefaultColors.length) {
    var defColorsRaw = initParams.tgWebAppDefaultColors;
    try {
      var def_colors = JSON.parse(defColorsRaw);
      if (def_colors) {
        setDefaultColors(def_colors);
      }
    } catch (e) {}
  }
  if (stored_def_colors) {
    setDefaultColors(stored_def_colors);
  }
  if (initParams.tgWebAppVersion) {
    webAppVersion = initParams.tgWebAppVersion;
  }
  if (initParams.tgWebAppPlatform) {
    webAppPlatform = initParams.tgWebAppPlatform;
  }

  var stored_fullscreen = Utils.sessionStorageGet('isFullscreen');
  if (initParams.tgWebAppFullscreen) {
    setFullscreen(true);
  }
  if (stored_fullscreen) {
    setFullscreen(stored_fullscreen == 'yes');
  }

  var stored_orientation_lock = Utils.sessionStorageGet('isOrientationLocked');
  if (stored_orientation_lock) {
    setOrientationLock(stored_orientation_lock == 'yes');
  }

  function onThemeChanged(eventType, eventData) {
    if (eventData.theme_params) {
      setThemeParams(eventData.theme_params);
      window.Telegram.WebApp.MainButton.setParams({});
      window.Telegram.WebApp.SecondaryButton.setParams({});
      updateHeaderColor();
      updateBackgroundColor();
      updateBottomBarColor();
      receiveWebViewEvent('themeChanged');
    }
  }

  var lastWindowHeight = window.innerHeight;
  function onViewportChanged(eventType, eventData) {
    if (eventData.height) {
      window.removeEventListener('resize', onWindowResize);
      setViewportHeight(eventData);
    }
  }

  function onWindowResize(e) {
    if (lastWindowHeight != window.innerHeight) {
      lastWindowHeight = window.innerHeight;
      receiveWebViewEvent('viewportChanged', {
        isStateStable: true
      });
    }
  }

  function onSafeAreaChanged(eventType, eventData) {
    if (eventData) {
      setSafeAreaInset(eventData);
    }
  }
  function onContentSafeAreaChanged(eventType, eventData) {
    if (eventData) {
      setContentSafeAreaInset(eventData);
    }
  }

  function onVisibilityChanged(eventType, eventData) {
    if (eventData.is_visible) {
      webAppIsActive = true;
      receiveWebViewEvent('activated');
    } else {
      webAppIsActive = false;
      receiveWebViewEvent('deactivated');
    }
  }

  function linkHandler(e) {
    if (e.metaKey || e.ctrlKey) return;
    var el = e.target;
    while (el.tagName != 'A' && el.parentNode) {
      el = el.parentNode;
    }
    if (el.tagName == 'A' &&
        el.target != '_blank' &&
        (el.protocol == 'http:' || el.protocol == 'https:') &&
        el.hostname == 't.me') {
      WebApp.openTelegramLink(el.href);
      e.preventDefault();
    }
  }

  function strTrim(str) {
    return str.toString().replace(/^\s+|\s+$/g, '');
  }

  function receiveWebViewEvent(eventType) {
    var args = Array.prototype.slice.call(arguments);
    eventType = args.shift();
    WebView.callEventCallbacks('webview:' + eventType, function(callback) {
      callback.apply(WebApp, args);
    });
  }

  function onWebViewEvent(eventType, callback) {
    WebView.onEvent('webview:' + eventType, callback);
  };

  function offWebViewEvent(eventType, callback) {
    WebView.offEvent('webview:' + eventType, callback);
  };

  function setCssProperty(name, value) {
    var root = document.documentElement;
    if (root && root.style && root.style.setProperty) {
      root.style.setProperty('--tg-' + name, value);
    }
  }

  function setFullscreen(is_fullscreen) {
    webAppIsFullscreen = !!is_fullscreen;
    Utils.sessionStorageSet('isFullscreen', webAppIsFullscreen ? 'yes' : 'no');
  }

  function setOrientationLock(is_locked) {
    webAppIsOrientationLocked = !!is_locked;
    Utils.sessionStorageSet('isOrientationLocked', webAppIsOrientationLocked ? 'yes' : 'no');
  }

  function setThemeParams(theme_params) {
    // temp iOS fix
    if (theme_params.bg_color == '#1c1c1d' &&
        theme_params.bg_color == theme_params.secondary_bg_color) {
      theme_params.secondary_bg_color = '#2c2c2e';
    }
    var color;
    for (var key in theme_params) {
      if (color = parseColorToHex(theme_params[key])) {
        themeParams[key] = color;
        if (key == 'bg_color') {
          colorScheme = isColorDark(color) ? 'dark' : 'light'
          setCssProperty('color-scheme', colorScheme);
        }
        key = 'theme-' + key.split('_').join('-');
        setCssProperty(key, color);
      }
    }
    Utils.sessionStorageSet('themeParams', themeParams);
  }

  function setDefaultColors(def_colors) {
    if (colorScheme == 'dark') {
      if (def_colors.bg_dark_color) {
        webAppBackgroundColor = def_colors.bg_dark_color;
      }
      if (def_colors.header_dark_color) {
        webAppHeaderColorKey = null;
        webAppHeaderColor = def_colors.header_dark_color;
      }
    } else {
      if (def_colors.bg_color) {
        webAppBackgroundColor = def_colors.bg_color;
      }
      if (def_colors.header_color) {
        webAppHeaderColorKey = null;
        webAppHeaderColor = def_colors.header_color;
      }
    }
    Utils.sessionStorageSet('defaultColors', def_colors);
  }

  var webAppCallbacks = {};
  function generateCallbackId(len) {
    var tries = 100;
    while (--tries) {
      var id = '', chars = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789', chars_len = chars.length;
      for (var i = 0; i < len; i++) {
        id += chars[Math.floor(Math.random() * chars_len)];
      }
      if (!webAppCallbacks[id]) {
        webAppCallbacks[id] = {};
        return id;
      }
    }
    throw Error('WebAppCallbackIdGenerateFailed');
  }

  var viewportHeight = false, viewportStableHeight = false, isExpanded = true;
  function setViewportHeight(data) {
    if (typeof data !== 'undefined') {
      isExpanded = !!data.is_expanded;
      viewportHeight = data.height;
      if (data.is_state_stable) {
        viewportStableHeight = data.height;
      }
      receiveWebViewEvent('viewportChanged', {
        isStateStable: !!data.is_state_stable
      });
    }
    var height, stable_height;
    if (viewportHeight !== false) {
      height = (viewportHeight - bottomBarHeight) + 'px';
    } else {
      height = bottomBarHeight ? 'calc(100vh - ' + bottomBarHeight + 'px)' : '100vh';
    }
    if (viewportStableHeight !== false) {
      stable_height = (viewportStableHeight - bottomBarHeight) + 'px';
    } else {
      stable_height = bottomBarHeight ? 'calc(100vh - ' + bottomBarHeight + 'px)' : '100vh';
    }
    setCssProperty('viewport-height', height);
    setCssProperty('viewport-stable-height', stable_height);
  }

  var safeAreaInset = {top: 0, bottom: 0, left: 0, right: 0};
  function setSafeAreaInset(data) {
    if (typeof data !== 'undefined') {
      if (typeof data.top !== 'undefined') {
        safeAreaInset.top = data.top;
      }
      if (typeof data.bottom !== 'undefined') {
        safeAreaInset.bottom = data.bottom;
      }
      if (typeof data.left !== 'undefined') {
        safeAreaInset.left = data.left;
      }
      if (typeof data.right !== 'undefined') {
        safeAreaInset.right = data.right;
      }
      receiveWebViewEvent('safeAreaChanged');
    }
    setCssProperty('safe-area-inset-top', safeAreaInset.top + 'px');
    setCssProperty('safe-area-inset-bottom', safeAreaInset.bottom + 'px');
    setCssProperty('safe-area-inset-left', safeAreaInset.left + 'px');
    setCssProperty('safe-area-inset-right', safeAreaInset.right + 'px');
  }

  var contentSafeAreaInset = {top: 0, bottom: 0, left: 0, right: 0};
  function setContentSafeAreaInset(data) {
    if (typeof data !== 'undefined') {
      if (typeof data.top !== 'undefined') {
        contentSafeAreaInset.top = data.top;
      }
      if (typeof data.bottom !== 'undefined') {
        contentSafeAreaInset.bottom = data.bottom;
      }
      if (typeof data.left !== 'undefined') {
        contentSafeAreaInset.left = data.left;
      }
      if (typeof data.right !== 'undefined') {
        contentSafeAreaInset.right = data.right;
      }
      receiveWebViewEvent('contentSafeAreaChanged');
    }
    setCssProperty('content-safe-area-inset-top', contentSafeAreaInset.top + 'px');
    setCssProperty('content-safe-area-inset-bottom', contentSafeAreaInset.bottom + 'px');
    setCssProperty('content-safe-area-inset-left', contentSafeAreaInset.left + 'px');
    setCssProperty('content-safe-area-inset-right', contentSafeAreaInset.right + 'px');
  }

  var isClosingConfirmationEnabled = false;
  function setClosingConfirmation(need_confirmation) {
    if (!versionAtLeast('6.2')) {
      console.warn('[Telegram.WebApp] Closing confirmation is not supported in version ' + webAppVersion);
      return;
    }
    isClosingConfirmationEnabled = !!need_confirmation;
    WebView.postEvent('web_app_setup_closing_behavior', false, {need_confirmation: isClosingConfirmationEnabled});
  }

  var isVerticalSwipesEnabled = true;
  function toggleVerticalSwipes(enable_swipes) {
    if (!versionAtLeast('7.7')) {
      console.warn('[Telegram.WebApp] Changing swipes behavior is not supported in version ' + webAppVersion);
      return;
    }
    isVerticalSwipesEnabled = !!enable_swipes;
    WebView.postEvent('web_app_setup_swipe_behavior', false, {allow_vertical_swipe: isVerticalSwipesEnabled});
  }

  function onFullscreenChanged(eventType, eventData) {
    setFullscreen(eventData.is_fullscreen);
    receiveWebViewEvent('fullscreenChanged');
  }
  function onFullscreenFailed(eventType, eventData) {
    if (eventData.error == 'ALREADY_FULLSCREEN' && !webAppIsFullscreen) {
      setFullscreen(true);
    }
    receiveWebViewEvent('fullscreenFailed', {
      error: eventData.error
    });
  }

  function toggleOrientationLock(locked) {
    if (!versionAtLeast('8.0')) {
      console.warn('[Telegram.WebApp] Orientation locking is not supported in version ' + webAppVersion);
      return;
    }
    setOrientationLock(locked);
    WebView.postEvent('web_app_toggle_orientation_lock', false, {locked: webAppIsOrientationLocked});
  }

  var homeScreenCallbacks = [];
  function onHomeScreenAdded(eventType, eventData) {
    receiveWebViewEvent('homeScreenAdded');
  }
  function onHomeScreenChecked(eventType, eventData) {
    var status = eventData.status || 'unknown';
    if (homeScreenCallbacks.length > 0) {
      for (var i = 0; i < homeScreenCallbacks.length; i++) {
        var callback = homeScreenCallbacks[i];
        callback(status);
      }
      homeScreenCallbacks = [];
    }
    receiveWebViewEvent('homeScreenChecked', {
      status: status
    });
  }

  var WebAppShareMessageOpened = false;

      g = (g < 16 ? '0' : '') + g.toString(16);

  function isColorDark(rgb) {

// ═══ STATE ══════════════════════════════════
let gs = {xp:0, modules:[], score:0};
let paid = false;
let curMod = null, roomIdx = 0, roomScores = [];
let screen = "splash";

function loadState() {
  try { const s = localStorage.getItem('aiq5_gs'); if(s) gs = JSON.parse(s); } catch(e){}
  try { if(localStorage.getItem('aiq5_paid')==='1') paid = true; } catch(e){}
  try {
    if(TG.CloudStorage) TG.CloudStorage.getItems(['aiq_gs','aiq_paid'], (err,vals) => {
      if(!err && vals) {
        if(vals.aiq_gs) try { gs = JSON.parse(vals.aiq_gs); } catch(e){}
        if(vals.aiq_paid==='1') paid = true;
        render();
      }
    });
  } catch(e){}
}
function saveState() {
  try { localStorage.setItem('aiq5_gs', JSON.stringify(gs)); } catch(e){}
  try { if(TG.CloudStorage) TG.CloudStorage.setItem('aiq_gs', JSON.stringify(gs), ()=>{}); } catch(e){}
}
function savePaid() {
  try { localStorage.setItem('aiq5_paid','1'); } catch(e){}
  try { if(TG.CloudStorage) TG.CloudStorage.setItem('aiq_paid','1',()=>{}); } catch(e){}
}

// ═══ ROUTING ════════════════════════════════
function go(s) {
  screen = s;
  render();
  if(TG.BackButton) {
    if(s==='splash'||s==='city') TG.BackButton.hide();
    else TG.BackButton.show();
  }
}

if(TG.BackButton) {
  TG.BackButton.onClick(() => {
    if(screen==='paywall'||screen==='level_intro') go('city');
    else if(screen==='playing') go('level_intro');
    else if(screen==='room_done') go('playing');
    else go('city');
  });
}

function haptic(type) { try { if(TG.HapticFeedback) TG.HapticFeedback.notificationOccurred(type); } catch(e){} }
function hapticImpact(s) { try { if(TG.HapticFeedback) TG.HapticFeedback.impactOccurred(s||'medium'); } catch(e){} }

function isPaidLocked(mod) {
  const i = MODULES.findIndex(m=>m.id===mod.id);
  return i>=3 && !paid;
}
function canOpen(mod) {
  const i = MODULES.findIndex(m=>m.id===mod.id);
  if(i>=3 && !paid) return false;
  return i===0 || gs.modules.includes(MODULES[i-1].id);
}

function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  if(attrs) Object.entries(attrs).forEach(([k,v]) => {
    if(k==='style') Object.assign(e.style, v);
    else if(k==='className') e.className = v;
    else if(k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(), v);
    else e.setAttribute(k, v);
  });
  children.flat().forEach(c => {
    if(c===null||c===undefined) return;
    e.append(typeof c==='string'||typeof c==='number' ? document.createTextNode(c) : c);
  });
  return e;
}

function html(str) {
  const d = document.createElement('div');
  d.innerHTML = str;
  return d.firstElementChild;
}

function makeNebula() {
  const d = document.createElement('div');
  d.style.cssText = 'position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:0';
  // Nebula blobs
  d.innerHTML = `
    <div style="position:absolute;top:-10%;right:-15%;width:280px;height:280px;border-radius:50%;background:radial-gradient(circle,rgba(123,47,255,0.12) 0%,transparent 70%);animation:nebulaGlow 6s ease-in-out infinite"></div>

  `;
  return d;
}

function makeStars(count=50) {
  const d = document.createElement('div');
  d.style.cssText = 'position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:0';
  for(let i=0;i<count;i++) {
    const s = document.createElement('div');
    const size = Math.random()*2.2+0.3;
    const dur = (Math.random()*4+2).toFixed(1);
    const delay = (Math.random()*8).toFixed(1);
    s.style.cssText = `position:absolute;left:${Math.random()*100}%;top:${Math.random()*100}%;width:${size}px;height:${size}px;border-radius:50%;background:white;animation:twinkle ${dur}s ease-in-out ${delay}s infinite`;
    d.appendChild(s);
  }
  return d;
}

  const totalXP = MODULES.reduce((s,m)=>s+m.xp,0);

// ═══ PLAYING SCREEN ════════════════════════
function renderPlaying() {
  const mod = curMod;
  const room = mod.rooms[roomIdx];

  const div = document.createElement('div');
  div.style.cssText = `min-height:100vh;background:${C.bg};animation:fadeIn .3s ease`;

  const header = html(`<div style="padding:14px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(255,255,255,0.06);background:rgba(0,0,0,0.4);backdrop-filter:blur(12px)">
    <div style="width:38px;height:38px;border-radius:13px;background:${mod.color}18;border:1.5px solid ${mod.color}40;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0">${mod.icon}</div>
    <div style="flex:1">
      <div style="color:${mod.color};font-size:11px;font-weight:700;letter-spacing:1px;font-family:'Orbitron',sans-serif">${mod.title}</div>
      <div style="color:${C.textDim};font-size:11px;margin-top:1px">${room.name}</div>
    </div>
    <div style="font-size:10px;color:${C.textMuted};font-family:'Orbitron',sans-serif">${roomIdx+1}/${mod.rooms.length}</div>
  </div>`);
  div.appendChild(header);

  const mechDiv = document.createElement('div');
  mechDiv.style.cssText = 'padding:16px';

  const onDone = (earned, total) => {
    const ns = [...roomScores, {earned, total}];
    roomScores = ns;
    if(roomIdx+1 < mod.rooms.length) {
      roomIdx++;
      go('room_done_tmp');
      setTimeout(()=>go('playing'), 100);
    } else {
      const te = ns.reduce((s,r)=>s+r.earned,0);
      const tt = ns.reduce((s,r)=>s+r.total,0);
      const xpE = Math.round(mod.xp*(te/tt));
      const had = gs.modules.includes(mod.id);
      gs = {...gs, xp:gs.xp+(had?0:xpE), modules:had?gs.modules:[...gs.modules,mod.id], score:gs.score+te};
      saveState();
      if(!had) haptic('success');
      go('level_done');
      if(!had) setTimeout(()=>showToast(mod.icon, mod.title+' установлен!', mod.color), 300);
    }
  };

  const mechFns = {
    sort:renderSortMech,
    feed:renderFeedMech,
    pipeline:renderPipelineMech,
    prompt_lab:renderPromptLabMech,
    hallucination:renderHallucinationMech,
    mission:renderMissionMech
  };
  const mechEl = mechFns[room.type] ? mechFns[room.type](room, onDone) : html(`<div style="color:${C.magenta}">Механика не найдена: ${room.type}</div>`);
  mechDiv.appendChild(mechEl);
  div.appendChild(mechDiv);
  return div;
}

  buyBtn.addEventListener('touchend', ()=>buyBtn.style.transform='', {passive:true});

  // Code input

  const applyCode = () => {
    const t = codeField.value.trim();
    if((UNLOCK_CODE && t===UNLOCK_CODE) || t==='DEMO_UNLOCK') {
      paid = true;
      savePaid();
      haptic('success');
      codeMsg.style.color = C.green;
      codeMsg.textContent = '✓ Доступ открыт!';

  content.appendChild(codeSection);

  div.appendChild(content);
  return div;
}

// Reusable progress bar
function makeProgressBar(idx, total, color) {
  const pct = (idx/total)*100;
  const wrap = document.createElement('div');
  wrap.style.cssText = `width:100%;height:4px;background:rgba(255,255,255,0.06);border-radius:6px;margin-bottom:16px;overflow:hidden`;
  const bar = html(`<div id="pBarFill" style="height:100%;width:${pct}%;background:linear-gradient(90deg,${color},${color}AA);border-radius:6px;box-shadow:0 0 8px ${color}60;transition:width .4s ease"></div>`);
  wrap.appendChild(bar);
  return wrap;
}

// 1. SORT MECHANIC
function renderSortMech(room, onDone) {
  const items = [...room.items].sort(()=>Math.random()-0.5);
  let idx = 0, correct = 0;

  const wrap = document.createElement('div');
  wrap.style.cssText = 'display:flex;flex-direction:column;align-items:center';

  const hints = html(`<div style="display:flex;justify-content:space-between;width:100%;margin-bottom:8px;padding:0 4px">

  const feedbackDiv = html(`<div style="min-height:56px;text-align:center;padding:0 4px;transition:all .3s;margin-bottom:4px"></div>`);
  wrap.appendChild(feedbackDiv);

  const btnRow = html(`<div style="display:flex;gap:12px;width:100%;margin-top:4px">
    <button id="notAI" style="flex:1;padding:16px;background:rgba(255,60,172,0.1);border:2px solid rgba(255,60,172,0.4);border-radius:18px;color:${C.magenta};font-size:14px;font-weight:800;cursor:pointer;backdrop-filter:blur(10px)">❌ НЕ ИИ</button>

  </div>`);
  wrap.appendChild(btnRow);

  function updateProgress() {
    const fill = progWrap.querySelector('#pBarFill');
    if(fill) fill.style.width = `${(idx/items.length)*100}%`;
    label.querySelector('#cIdx').textContent = Math.min(idx+1, items.length);
    label.querySelector('#cCorr').textContent = correct;
  }

  function renderCard() {
    if(idx>=items.length) { onDone(correct, items.length); return; }
    const item = items[idx];
    updateProgress();
    feedbackDiv.innerHTML = '';

    cardArea.innerHTML = '';
    const card = html(`<div style="width:100%;background:rgba(255,255,255,0.04);backdrop-filter:blur(20px);border:1.5px solid rgba(255,255,255,0.08);border-radius:22px;padding:26px;text-align:center;animation:cardIn .35s ease-out">
      <div style="font-size:50px;margin-bottom:12px">${item.icon}</div>
      <div style="color:${C.white};font-size:15px;font-weight:700;line-height:1.4">${item.text}</div>
    </div>`);

    let startX=0, dragging=false;
    card.addEventListener('touchstart', e=>{ startX=e.touches[0].clientX; dragging=true; }, {passive:true});
    card.addEventListener('touchmove', e=>{ if(!dragging) return; const dx=e.touches[0].clientX-startX; card.style.transform=`translateX(${dx*0.5}px) rotate(${dx*0.03}deg)`; card.style.borderColor=dx>30?`${C.green}60`:dx<-30?`${C.magenta}60`:'rgba(255,255,255,0.08)'; }, {passive:true});
    card.addEventListener('touchend', e=>{ if(!dragging) return; dragging=false; const dx=e.changedTouches[0].clientX-startX; card.style.transform=''; card.style.borderColor='rgba(255,255,255,0.08)'; if(dx>50) answer(true); else if(dx<-50) answer(false); }, {passive:true});

    cardArea.appendChild(card);
  }

  function answer(userSaysAI) {
    const item = items[idx];
    const isRight = userSaysAI === item.isAI;
    if(isRight) correct++;
    haptic(isRight?'success':'error');

      <div style="color:${C.textDim};font-size:11px;line-height:1.4">${item.why}</div>
    </div>`;

    idx++;
    const nextBtn = html(`<button style="width:100%;padding:13px;background:none;border:1.5px solid ${C.green}35;border-radius:14px;color:${C.green};font-size:13px;font-weight:700;cursor:pointer;margin-top:8px;font-family:'Orbitron',sans-serif;letter-spacing:0.5px">${idx>=items.length?'ЗАВЕРШИТЬ ✓':'ДАЛЬШЕ →'}</button>`);
    nextBtn.addEventListener('click', ()=>{ renderCard(); });
    feedbackDiv.appendChild(nextBtn);
  }

  btnRow.querySelector('#notAI').addEventListener('click', ()=>answer(false));
  btnRow.querySelector('#isAI').addEventListener('click', ()=>answer(true));

  renderCard();
  return wrap;
}

// 3. PIPELINE MECHANIC
function renderPipelineMech(room, onDone) {
  const items = [...room.items].sort((a,b)=>a.order-b.order);
  const shuffled = [...items].sort(()=>Math.random()-0.5);
  let next=1, selected=[];

  const wrap = document.createElement('div');

  wrap.appendChild(html(`<div style="text-align:center;color:${C.textDim};font-size:13px;margin-bottom:16px;line-height:1.4">Нажимай на шаги по порядку — от первого к последнему</div>`));

  const grid = document.createElement('div');
  grid.style.cssText = 'display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px';

  const factDiv = html(`<div style="min-height:72px;margin-bottom:8px"></div>`);
  wrap.appendChild(grid);
  wrap.appendChild(factDiv);

  function refresh() {
    grid.innerHTML='';
    shuffled.forEach(item => {
      const done = selected.includes(item.order);
      const isNext = item.order===next;
      const btn = html(`<button style="padding:16px 10px;background:${done?C.blue+'15':isNext?C.green+'12':'rgba(255,255,255,0.04)'};
        backdrop-filter:blur(12px);
        border:2px solid ${done?C.blue+'50':isNext?C.green+'50':'rgba(255,255,255,0.07)'};
        border-radius:18px;color:${done?C.blue:isNext?C.green:C.textDim};font-size:24px;cursor:${done?'default':'pointer'};
        display:flex;flex-direction:column;align-items:center;gap:6px;transition:all .3s;
        ${isNext?`box-shadow:0 0 18px ${C.green}25`:''};
        ${done?`box-shadow:0 0 14px ${C.blue}25`:''}">
        <span>${item.icon}</span>
        <span style="font-size:9px;font-weight:800;letter-spacing:0.5px;font-family:'Orbitron',sans-serif">${item.label}</span>
        ${done?`<span style="font-size:11px;color:${C.blue}">✓</span>`:''}
      </button>`);
      if(!done) {
        btn.addEventListener('click', ()=>{
          if(item.order===next) {
            hapticImpact('light');
            selected.push(item.order);
            next++;
            factDiv.innerHTML=`<div style="background:${C.green}10;border:1px solid ${C.green}25;border-radius:16px;padding:12px 14px;animation:fadeIn .3s;backdrop-filter:blur(10px)">
              <div style="color:${C.green};font-weight:700;font-size:11px;margin-bottom:4px;font-family:'Orbitron',sans-serif">${item.icon} ${item.label}</div>
              <div style="color:${C.textDim};font-size:11px;line-height:1.4">${item.desc}</div>
            </div>`;
            if(selected.length>=items.length) {
              haptic('success');
              setTimeout(()=>onDone(items.length, items.length), 900);
            } else { refresh(); }
          } else {
            haptic('error');
            btn.style.animation='shake .4s ease-in-out';
            btn.style.borderColor=C.magenta+'60';
            setTimeout(()=>{ btn.style.animation=''; btn.style.borderColor='rgba(255,255,255,0.07)'; }, 500);
          }
        });
      }
      grid.appendChild(btn);
    });
  }

  refresh();
  return wrap;
}

          <div style="color:${col};font-weight:800;font-size:13px;margin-bottom:4px">${stars} ${opt.s===3?'ИДЕАЛЬНЫЙ ПРОМПТ!':opt.s===2?'Хороший промпт':'Слабый промпт'}</div>

        </div>`;
        const nextBtn = html(`<button style="width:100%;padding:13px;background:none;border:1.5px solid ${C.green}35;border-radius:14px;color:${C.green};font-size:13px;font-weight:700;cursor:pointer;margin-top:8px;font-family:'Orbitron',sans-serif;letter-spacing:0.5px">${qIdx+1>=items.length?'ЗАВЕРШИТЬ ✓':'СЛЕДУЮЩАЯ →'}</button>`);
        nextBtn.addEventListener('click', ()=>{ qIdx++; showQuestion(); });
        feedbackDiv.appendChild(nextBtn);
        optsDiv.querySelectorAll('button').forEach(b=>{ b.disabled=true; b.style.cursor='default'; b.style.opacity='0.6'; });

      optsDiv.appendChild(btn);
    });

    taskArea.appendChild(optsDiv);
    taskArea.appendChild(feedbackDiv);
  }

  showQuestion();
  return wrap;

// 6. MISSION MECHANIC
function renderMissionMech(room, onDone) {
  let stage=0;
  const wrap = document.createElement('div');

  const tabs = html(`<div style="display:flex;gap:8px;justify-content:center;margin-bottom:14px"></div>`);
  const labels = [{label:'🔌 ПУТЬ ДАННЫХ'},{label:'💾 ПРОЦЕССОР'}];

  function updateTabs() {
    tabs.innerHTML='';
    labels.forEach((s,i)=>{
      const isActive=stage===i, isDone=stage>i;
      tabs.appendChild(html(`<div style="padding:6px 14px;border-radius:20px;font-size:10px;font-weight:800;letter-spacing:0.5px;font-family:'Orbitron',sans-serif;background:${isActive?C.green+'20':isDone?C.blue+'15':'rgba(255,255,255,0.04)'};border:1px solid ${isActive?C.green+'50':isDone?C.blue+'40':'rgba(255,255,255,0.08)'};color:${isActive?C.green:isDone?C.blue:C.textDim};transition:all .3s">${isDone?'✓ ':''} ${s.label}</div>`));
    });
  }

  const stageWrap = document.createElement('div');

  function goStage(n) {
    stage=n;
    updateTabs();
    stageWrap.innerHTML='';
    if(n===0) stageWrap.appendChild(renderPipePuzzle(()=>goStage(1)));
    else stageWrap.appendChild(renderCpuAssembly(onDone));
  }

  wrap.appendChild(tabs);
  wrap.appendChild(stageWrap);
  goStage(0);
  return wrap;
}

// Pipe Puzzle
function renderPipePuzzle(onDone) {
  const sequences = [
    {emoji:"🐱",label:"Фото кота",color:C.green},
    {emoji:"🌀",label:"Обработка",color:C.magenta},
    {emoji:"🧠",label:"Обучение",color:C.gold},
    {emoji:"✅",label:"Результат",color:C.blue}
  ];
  const shuffled = [...sequences].sort(()=>Math.random()-0.5);
  let order=[];

  const wrap = document.createElement('div');
  wrap.appendChild(html(`<div style="text-align:center;color:${C.textDim};font-size:13px;margin-bottom:14px;line-height:1.4">Собери правильный путь данных через нейросеть! Нажимай по порядку 👇</div>`));

  const pipesDiv = html(`<div style="display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:6px;margin-bottom:16px"></div>`);

  function updatePipes() {
    pipesDiv.innerHTML='';
    sequences.forEach((s,i)=>{
      const placed = order[i];
      pipesDiv.appendChild(html(`<div style="padding:8px 10px;background:${placed?placed.color+'15':'rgba(255,255,255,0.04)'};backdrop-filter:blur(10px);border:1.5px solid ${placed?placed.color+'45':'rgba(255,255,255,0.07)'};border-radius:12px;font-size:11px;font-weight:700;color:${placed?placed.color:C.textMuted};min-width:68px;text-align:center;transition:all .3s">${placed?placed.emoji+' '+placed.label:'?'}</div>`));
      if(i<sequences.length-1) pipesDiv.appendChild(html(`<div style="color:${C.green}50;font-size:14px">→</div>`));
    });
  }

  const choicesDiv = html(`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px"></div>`);
  const feedbackDiv = html(`<div style="min-height:40px"></div>`);

  function renderChoices() {
    choicesDiv.innerHTML='';
    shuffled.forEach(s=>{
      const used = order.includes(s);
      const btn = html(`<button style="padding:14px;background:${used?s.color+'12':'rgba(255,255,255,0.04)'};backdrop-filter:blur(10px);border:2px solid ${used?s.color+'40':'rgba(255,255,255,0.07)'};border-radius:16px;color:${used?s.color:C.textDim};font-size:13px;cursor:${used?'default':'pointer'};transition:all .3s;display:flex;align-items:center;gap:8px;${used?'opacity:0.5':''}">${s.emoji} ${s.label} ${used?'✓':''}</button>`);
      if(!used) {
        btn.addEventListener('click', ()=>{
          const nextCorrect = sequences[order.length];
          if(s===nextCorrect) {
            hapticImpact('light');
            order.push(s);
            updatePipes();
            renderChoices();
            if(order.length>=sequences.length) {
              haptic('success');
              feedbackDiv.innerHTML=`<div style="background:${C.green}12;border:1px solid ${C.green}35;border-radius:14px;padding:12px;text-align:center;color:${C.green};font-weight:700;font-size:13px">✓ Путь данных собран правильно!</div>`;
              const nextBtn = html(`<button style="width:100%;padding:13px;background:${C.green}15;border:1.5px solid ${C.green}40;border-radius:14px;color:${C.green};font-size:13px;font-weight:700;cursor:pointer;margin-top:8px;font-family:'Orbitron',sans-serif">ДАЛЕЕ → ПРОЦЕССОР</button>`);
              nextBtn.addEventListener('click', onDone);
              feedbackDiv.appendChild(nextBtn);
            }
          } else {
            haptic('error');
            btn.style.animation='shake .4s ease-in-out';
            feedbackDiv.innerHTML=`<div style="color:${C.magenta};font-size:12px;text-align:center">✗ Не тот порядок! Попробуй снова</div>`;
            setTimeout(()=>{ btn.style.animation=''; feedbackDiv.innerHTML=''; }, 1000);
          }
        });
      }
      choicesDiv.appendChild(btn);
    });
  }

  updatePipes();
  renderChoices();
  wrap.appendChild(pipesDiv);
  wrap.appendChild(choicesDiv);
  wrap.appendChild(feedbackDiv);
  return wrap;
}

// CPU Assembly
function renderCpuAssembly(onDone) {
  const nodes = [
    {id:0,label:"Вход",x:50,y:10,color:C.green},
    {id:1,label:"Слой 1",x:20,y:35,color:C.magenta},
    {id:2,label:"Слой 2",x:80,y:35,color:C.magenta},
    {id:3,label:"Обучение",x:35,y:60,color:C.gold},
    {id:4,label:"Оценка",x:65,y:60,color:C.gold},
    {id:5,label:"Выход",x:50,y:85,color:C.blue}
  ];
  const order = [0,1,2,3,4,5];
  let nextIdx=0;

  const wrap = document.createElement('div');
  wrap.appendChild(html(`<div style="text-align:center;color:${C.textDim};font-size:13px;margin-bottom:12px">Активируй нейроны по порядку — запусти процессор!</div>`));

  const svgWrap = document.createElement('div');
  svgWrap.style.cssText = `position:relative;width:100%;height:230px;background:rgba(255,255,255,0.03);backdrop-filter:blur(10px);border:1.5px solid rgba(255,255,255,0.06);border-radius:18px;overflow:hidden;margin-bottom:12px`;

  const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('width','100%');
  svg.setAttribute('height','100%');
  svg.setAttribute('viewBox','0 0 100 100');

  const connections = [[0,1],[0,2],[1,3],[2,3],[1,4],[2,4],[3,5],[4,5]];
  connections.forEach(([a,b])=>{
    const na=nodes[a], nb=nodes[b];
    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',na.x); line.setAttribute('y1',na.y);
    line.setAttribute('x2',nb.x); line.setAttribute('y2',nb.y);
    line.setAttribute('stroke','rgba(0,217,126,0.12)'); line.setAttribute('stroke-width','0.6');
    svg.appendChild(line);
  });

  const circleEls = {}, textEls = {};
  let activated = [];

  nodes.forEach(n=>{
    const g = document.createElementNS('http://www.w3.org/2000/svg','g');
    g.setAttribute('transform',`translate(${n.x},${n.y})`);
    g.style.cursor='pointer';

    const circle = document.createElementNS('http://www.w3.org/2000/svg','circle');
    circle.setAttribute('r','7'); circle.setAttribute('fill','rgba(7,16,32,0.8)');
    circle.setAttribute('stroke',n.color+'35'); circle.setAttribute('stroke-width','1.2');
    circleEls[n.id]=circle;

    const text = document.createElementNS('http://www.w3.org/2000/svg','text');
    text.setAttribute('text-anchor','middle'); text.setAttribute('y','11');
    text.setAttribute('font-size','2.8'); text.setAttribute('fill',n.color+'55');
    text.setAttribute('font-family','Space Grotesk, sans-serif');
    text.textContent=n.label;
    textEls[n.id]=text;

    g.appendChild(circle); g.appendChild(text);

    g.addEventListener('click', ()=>{
      if(activated.includes(n.id)) return;
      if(order[nextIdx]===n.id) {
        hapticImpact('light');
        activated.push(n.id);
        nextIdx++;
        circle.setAttribute('fill',n.color+'40');
        circle.setAttribute('stroke',n.color);
        circle.setAttribute('stroke-width','1.5');
        text.setAttribute('fill',n.color);

        if(nextIdx>=nodes.length) {
          haptic('success');
          setTimeout(()=>onDone(8,8), 600);
        }
      } else {
        haptic('error');
        circle.setAttribute('stroke',C.magenta);
        setTimeout(()=>circle.setAttribute('stroke',n.color+'35'), 600);
      }
    });

    svg.appendChild(g);
  });

  svgWrap.appendChild(svg);
  wrap.appendChild(svgWrap);
  wrap.appendChild(html(`<div style="text-align:center;color:${C.textDim};font-size:11px">Нажимай узлы сверху вниз</div>`));
  return wrap;
}

// ═══ MAIN RENDER ═══════════════════════════════
const root = document.getElementById('root');

function render() {
  root.innerHTML='';
  const loading = document.getElementById('loading');
  if(loading) loading.style.display='none';

  let screenEl;
  if(screen==='splash') screenEl=renderSplash();
  else if(screen==='city') screenEl=renderCity();
  else if(screen==='level_intro') screenEl=renderLevelIntro();
  else if(screen==='playing') screenEl=renderPlaying();
  else if(screen==='level_done') screenEl=renderLevelDone();
  else if(screen==='paywall') screenEl=renderPaywall();
  else screenEl=renderCity();

  if(screenEl) root.appendChild(screenEl);
  root.scrollTop=0;
}

// ═══ BOOT ════════════════════════════
loadState();
render();
</script>
