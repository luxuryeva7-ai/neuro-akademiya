  <title>Нейро Академия</title>
  <link rel="preconnect" href="https://fonts.bunny.net">
  <link href="https://fonts.bunny.net/css2?family=nunito:wght@400;600;700;800;900&family=orbitron:wght@500;700;900&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#080C18;font-family:'Nunito',sans-serif;overflow-x:hidden;padding-top:var(--tg-safe-area-inset-top,0px)}
    .safe-bottom{padding-bottom:max(var(--tg-safe-area-inset-bottom,0px),20px)}
    button{font-family:inherit;-webkit-tap-highlight-color:transparent;cursor:pointer;border:none;outline:none}
    ::-webkit-scrollbar{width:0}
    @keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    @keyframes slideDown{from{opacity:0;transform:translateY(-20px) translateX(-50%)}to{opacity:1;transform:translateY(0) translateX(-50%)}}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
    @keyframes rocketFloat{0%,100%{transform:translateY(0) rotate(-1.5deg)}50%{transform:translateY(-12px) rotate(1.5deg)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
    @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
    @keyframes pop{0%{transform:scale(.7);opacity:0}60%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
    @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
    @keyframes cardIn{from{opacity:0;transform:scale(.85) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
    @keyframes twinkle{0%,100%{opacity:.15;transform:scale(1)}50%{opacity:.9;transform:scale(1.5)}}
    @keyframes borderPulse{0%,100%{border-color:rgba(196,77,255,.3)}50%{border-color:rgba(196,77,255,.75)}}
    @keyframes orbitSpin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
    .anim-pop{animation:pop .35s ease-out}
    .anim-shake{animation:shake .4s ease-in-out}
    .anim-fadeIn{animation:fadeIn .4s ease-out}
    .anim-card{animation:cardIn .35s ease-out}
  </style>
</head>

function getConns(type,rot){return PIPE_CONNS[type][rot%4];}

// travelDir: направление движения K ячейке. incoming face = opp(travelDir)
function floodFill(cells,startR,startC,travelDir){
  var opp={0:2,1:3,2:0,3:1};
  var getCell=function(r,c){return cells.find(function(x){return x.r===r&&x.c===c;});};
  var visited={};

    var key=cur.r+','+cur.c;
    if(visited[key]) continue;
    var cell=getCell(cur.r,cur.c);
    if(!cell) continue;
    var conns=getConns(cell.type,cell.rot);

  }
  return visited;
}

function checkPath(cells){
  // Входим в (2,0) двигаясь на Восток(1) → incoming=W(3). straight[0]=[E,W] — W есть ✓

  var visited=floodFill(cells,2,0,1);

  var ec=cells.find(function(x){return x.r===2&&x.c===3;});
  return getConns(ec.type,ec.rot).includes(1);
}

  const [stage,setStage]=React.useState(0);

  return React.createElement('div',{style:{animation:'cardIn 0.3s ease-out'}},
    React.createElement('div',{style:{display:'flex',gap:6,justifyContent:'center',marginBottom:12}},

        }},(isDone?'✓ ':'')+s.label);
      })

      : React.createElement(CpuAssembly,{onDone:onDone})
  );
}
